<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="apple-touch-icon" href="IMG_2197.png">
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:sans-serif;background:#f3f4f6;padding:12px;}
h2{margin-bottom:14px;}
.bigWrap{background:#e5e7eb;padding:16px;border-radius:16px;margin-bottom:20px;}
textarea{width:100%;height:80px;padding:10px;margin-bottom:10px;border-radius:10px;border:1px solid #ccc;background:#f9fafb;}
.helper{background:#d1d5db;padding:10px;border-radius:10px;margin-bottom:12px;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;margin-top:8px;color:white;}
.blue{background:#4f7bd9;}
.copyBtn{background:#4fb07f;}
.pasteBtn{background:#6868d4;}
.urlBtn{background:#4a90c2;}
.orange{background:#f59e0b;}
.green{background:#16a34a;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;}
#selectArea{background:#e5e7eb;padding:15px;border-radius:12px;}
.line{margin-bottom:14px;}
.word{display:inline-block;padding:6px 8px;margin:2px;border-radius:8px;cursor:pointer;}
.single{background:#fde047;}
.group{background:#fb923c;color:white;}
.group.start{border-radius:8px 0 0 8px;}
.group.end{border-radius:0 8px 8px 0;}
.blank{display:inline-flex;align-items:center;justify-content:center;min-width:120px;min-height:30px;border-bottom:3px solid black;}
.jpHint{display:none;font-size:13px;}
.jpHint.show{display:block;}
#vocabBox{position:sticky;bottom:0;background:#f3f4f6;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
#quiz{padding-bottom:140px;}
.wordBox{padding:10px;border:1px solid #ccc;border-radius:10px;background:#fff;text-align:center;}
.wordBox.used{opacity:0.3;}
.correct{background:#86efac;}
.wrong{background:#fca5a5;}
.draggingClone{position:fixed;pointer-events:none;background:#f59e0b;color:white;padding:6px;border-radius:6px;}

#counter{text-align:center;font-weight:600;margin:8px 0;}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:#fff;
padding:10px 16px;
border-radius:10px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}
</style>
</head>

<body>

<h2>英語問題アプリ</h2>

<div class="bigWrap">
<div class="helper">英語と日本語を入力 → 選択 → 問題生成</div>

<textarea id="en"></textarea>
<textarea id="jp"></textarea>

<button class="btn blue" onclick="load()">選択開始</button>
<button class="btn copyBtn" onclick="copyData()">コピー</button>
<button class="btn pasteBtn" onclick="pasteData()">ペースト</button>
<button class="btn urlBtn" onclick="shareURL()">URL生成</button>
</div>

<div class="card">
<div id="selectArea"></div>
</div>

<div class="card">
<label><input type="checkbox" id="showJP"> 日本語表示</label>
<button class="btn orange" onclick="create()">問題生成</button>
</div>

<div id="quiz"></div>

<div id="toast"></div>

<script>

let pairs=[], selections={};
let selectedQ=[],answers={},wrongList=[];
let isDown=false,moved=false;
let groupId=0,currentGroup=null;

/* トースト */
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1500);
}

/* 保存 */
function saveState(){
localStorage.setItem("engApp",JSON.stringify({pairs,selections,selectedQ,answers}));
}

/* 復元 */
window.onload=()=>{
let d=localStorage.getItem("engApp");
if(d){
let data=JSON.parse(d);
pairs=data.pairs||[];
selections=data.selections||{};
selectedQ=data.selectedQ||[];
answers=data.answers||{};
en.value=pairs.map(p=>p.en).join("\n");
jp.value=pairs.map(p=>p.jp).join("\n");
selectedQ.length?renderQuiz():render();
}
};

/* コピー */
function copyData(){
navigator.clipboard.writeText(JSON.stringify({pairs,selections}));
showToast("コピー成功");
}

/* ペースト */
async function pasteData(){
let txt=await navigator.clipboard.readText();
let d=JSON.parse(txt);
pairs=d.pairs||[];
selections=d.selections||{};
en.value=pairs.map(p=>p.en).join("\n");
jp.value=pairs.map(p=>p.jp).join("\n");
render();
saveState();
}

/* URL */
function shareURL(){
let data=LZString.compressToEncodedURIComponent(JSON.stringify({pairs,selections}));
navigator.clipboard.writeText(location.href.split("?")[0]+"?data="+data);
showToast("共有URLコピー成功");
}

/* load */
function load(){
pairs=en.value.split("\n").map((e,i)=>({en:e,jp:jp.value.split("\n")[i]||""}));
selections={};
render();
saveState();
}

/* 選択 */
document.addEventListener("pointerdown",e=>{
if(!e.target.classList.contains("word"))return;
isDown=true;moved=false;
currentGroup=groupId++;
add(e.target);
});

document.addEventListener("pointermove",e=>{
if(!isDown)return;
e.preventDefault();
moved=true;
let el=document.elementFromPoint(e.clientX,e.clientY);
if(el&&el.classList.contains("word")){
add(el);
render();
}
});

document.addEventListener("pointerup",e=>{
if(!isDown)return;
if(!moved)toggle(e.target);
isDown=false;
saveState();
});

function toggle(el){
let l=+el.dataset.line,i=+el.dataset.i;
let arr=selections[l]||[];
selections[l]=arr.some(x=>x.i===i)?arr.filter(x=>x.i!==i):[...arr,{i}];
render();
saveState();
}

function add(el){
let l=+el.dataset.line,i=+el.dataset.i;
let arr=(selections[l]||[]).filter(x=>x.i!==i);
arr.push({i,gid:currentGroup});
selections[l]=arr;
}

/* 描画 */
function render(){
let html="";
pairs.forEach((p,line)=>{
let words=p.en.split(" ");
let arr=selections[line]||[];
let map={};arr.forEach(x=>map[x.i]=x);

let row="";
words.forEach((w,i)=>{
let cls="word";
let item=map[i];
if(item){
if(item.gid!=null){
cls+=" group";
let g=arr.filter(x=>x.gid===item.gid).map(x=>x.i);
if(i===Math.min(...g))cls+=" start";
if(i===Math.max(...g))cls+=" end";
}else cls+=" single";
}
row+=`<span class="${cls}" data-i="${i}" data-line="${line}">${w}</span>`;
});
html+=`<div class="line">${row}</div>`;
});
selectArea.innerHTML=html;
quiz.innerHTML="";
}

/* 問題生成 */
function create(){
answers={};selectedQ=[];

pairs.forEach((p,line)=>{
let raw=p.en.split(" ");
let words=raw.map(w=>({
word:w.replace(/[.,!?]/g,""),
mark:(w.match(/[.,!?]/)||[""])[0]
}));

let items=selections[line]||[];
if(!items.length)return;

let groups={};
items.forEach(x=>{
if(x.gid!=null)(groups[x.gid]??=[]).push(x.i);
else groups["s"+x.i]=[x.i];
});

Object.values(groups).forEach(g=>{
g.sort((a,b)=>a-b);
let s=g[0],e=g[g.length-1];

let text=words.map((w,i)=>{
if(i===s)return"______";
if(i>s&&i<=e)return"";
return w.word+w.mark;
}).join(" ").replace(/\s+/g," ").trim();

let ans=g.map(i=>words[i].word).join(" ");
selectedQ.push({text,ans,jp:p.jp});
});
});

selectedQ=selectedQ.sort(()=>Math.random()-0.5).slice(0,10);
renderQuiz();
saveState();
}

/* クイズ */
let touchWord=null,clone=null;

function renderQuiz(){
let vocab=selectedQ.map(q=>q.ans).sort(()=>Math.random()-0.5);
let show=document.getElementById("showJP").checked;
let html="";

selectedQ.forEach((q,i)=>{
html+=`
<div class="card">
${q.text.replace("______",`<span class="blank" data-i="${i}">______</span>`)}
${show?`<div class="jpHint show">${q.jp}</div>`:""}
</div>`;
});

/* ✅ vocabBox */
html+=`<div id="vocabBox">`;

vocab.forEach(v=>{
html+=`
<div class="wordBox"
ontouchstart="dragStart(event,'${v}')"
ontouchmove="dragMove(event)"
ontouchend="dragEnd(event)">
${v}</div>`;
});

/* ✅ ここで閉じる（重要） */
html+=`</div>`;

/* ✅ 外に出す */
html+=`
<div id="counter"></div>

<button class="btn green" onclick="check()">答え合わせ</button>
<button class="btn green" onclick="review()">復習問題</button>
`;

quiz.innerHTML=html;
updateCounter();
}

/* ドラッグ */
function dragStart(e,w){
touchWord=w;
clone=document.createElement("div");
clone.className="draggingClone";
clone.innerText=w;
document.body.appendChild(clone);
}

function dragMove(e){
if(!clone)return;
e.preventDefault();
let t=e.touches[0];
clone.style.left=(t.clientX-30)+"px";
clone.style.top=(t.clientY-20)+"px";
}

function dragEnd(e){
if(!clone)return;
let t=e.changedTouches[0];
let target=document.elementFromPoint(t.clientX,t.clientY);

if(target&&target.classList.contains("blank")){
let i=+target.dataset.i;

Object.keys(answers).forEach(k=>{
if(answers[k]===touchWord)answers[k]="";
});

answers[i]=touchWord;
updateUI();
saveState();
}

clone.remove();
clone=null;
}

/* 更新 */
function updateUI(){
document.querySelectorAll(".blank").forEach((el,i)=>{
el.innerText=answers[i]||"______";
});
updateCounter();
}

function updateCounter(){
let count=Object.values(answers).filter(v=>v).length;
let total=selectedQ.length;
let el=document.getElementById("counter");
if(el) el.innerText=`回答済み：${count} / ${total}`;
}

/* 判定 */
function check(){

let total = selectedQ.length;
let count = Object.values(answers).filter(v=>v).length;

if(count < total){
let ok = confirm(`${total-count}問未回答です。答え合わせしますか？`);
if(!ok) return;
}

wrongList=[];
document.querySelectorAll(".blank").forEach((el,i)=>{
let ans=answers[i]||"";
let ok=ans===selectedQ[i].ans;
el.classList.add(ok?"correct":"wrong");
if(!ok) wrongList.push(selectedQ[i]);
});
saveState();
}

/* 復習 */
function review(){
if(!wrongList.length){
showToast("復習する問題がありません");
return;
}
selectedQ=wrongList.sort(()=>Math.random()-0.5);
answers={};
renderQuiz();
}

</script>
</body>
</html>
