<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="apple-touch-icon" href="IMG_2197.png">
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:sans-serif;background:#f3f4f6;padding:10px;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;}
textarea{width:100%;height:70px;margin-bottom:8px;}
.btn{width:100%;padding:12px;border:none;border-radius:10px;margin-top:6px;color:white;}
.blue{background:#3b82f6;}
.orange{background:#f59e0b;}
.green{background:#16a34a;}
.copyBtn{background:#10b981;}
.pasteBtn{background:#6366f1;}
.urlBtn{background:#0ea5e9;}
.line{margin-bottom:8px;}
.word{display:inline-block;padding:6px;margin:2px;border-radius:6px;cursor:pointer;}
.single{background:#fde047;}
.group{background:#fb923c;color:white;margin:0;}
.group.start{border-radius:8px 0 0 8px;}
.group.end{border-radius:0 8px 8px 0;}
.blank{display:inline-block;min-width:80px;border-bottom:3px solid black;}
#vocabBox{position:sticky;bottom:0;background:#f3f4f6;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.wordBox{padding:8px;border:1px solid #ccc;border-radius:8px;text-align:center;background:#fff;}
.wordBox.used{opacity:0.3;}
.correct{background:#86efac;}
.wrong{background:#fca5a5;}
.draggingClone{position:fixed;pointer-events:none;background:#f59e0b;color:white;padding:6px;border-radius:6px;}
</style>
</head>

<body>

<h2>英語問題アプリ</h2>

<textarea id="en"></textarea>
<textarea id="jp"></textarea>

<button onclick="load()">選択開始</button>
<button onclick="shareURL()">URL生成</button>

<div id="selectArea"></div>

<button onclick="create()">問題生成</button>

<div id="quiz"></div>

<script>

let pairs=[], selections={};
let selectedQ=[],answers={};
let isDown=false,moved=false;
let groupId=0,currentGroup=null;

/* ===== URL復元 ===== */
window.onload=()=>{
let p=new URLSearchParams(location.search);
let d=p.get("data");
if(d){
let data=JSON.parse(LZString.decompressFromEncodedURIComponent(d));
pairs=data.pairs||[];
selections=data.selections||{};
render();
}
};

function shareURL(){
let data=LZString.compressToEncodedURIComponent(JSON.stringify({pairs,selections}));
navigator.clipboard.writeText(location.origin+location.pathname+"?data="+data);
}

/* ===== 入力 ===== */
function load(){
pairs=en.value.split("\n").map((e,i)=>({en:e,jp:(jp.value.split("\n")[i]||"")}));
selections={};
render();
}

/* ===== 選択 ===== */
document.addEventListener("pointerdown",e=>{
if(!e.target.classList.contains("word"))return;
isDown=true;moved=false;
currentGroup=groupId++;
add(e.target);
});

document.addEventListener("pointermove",e=>{
if(!isDown)return;
moved=true;
let el=document.elementFromPoint(e.clientX,e.clientY);
if(el&&el.classList.contains("word")){
add(el);
render();
}
});

document.addEventListener("pointerup",e=>{
if(!isDown)return;
if(!moved)toggle(e.target);
isDown=false;
});

function toggle(el){
let l=+el.dataset.line,i=+el.dataset.i;
if(!selections[l])selections[l]=[];
let arr=selections[l];

if(arr.some(x=>x.i===i)){
arr=arr.filter(x=>x.i!==i);
}else{
arr.push({i});
}
selections[l]=arr;
render();
}

function add(el){
let l=+el.dataset.line,i=+el.dataset.i;
if(!selections[l])selections[l]=[];
let arr=selections[l].filter(x=>x.i!==i);
arr.push({i,gid:currentGroup});
selections[l]=arr;
}

/* ===== 描画 ===== */
function render(){
let html="";
pairs.forEach((p,line)=>{
let words=p.en.split(" ");
let arr=selections[line]||[];
let map={};arr.forEach(x=>map[x.i]=x);

let row="";
words.forEach((w,i)=>{
let cls="word";
let item=map[i];

if(item){
if(item.gid!=null){
cls+=" group";
let g=arr.filter(x=>x.gid===item.gid).map(x=>x.i);
let min=Math.min(...g),max=Math.max(...g);
if(i===min)cls+=" start";
if(i===max)cls+=" end";
}else cls+=" single";
}

row+=`<span class="${cls}" data-i="${i}" data-line="${line}">${w}</span>`;
});
html+=`<div class="line">${row}</div>`;
});
selectArea.innerHTML=html;
}

/* ===== 問題生成（フレーズ対応） ===== */
function create(){
answers={};selectedQ=[];

pairs.forEach((p,line)=>{
let words=p.en.split(" ");
let items=selections[line]||[];
if(!items.length)return;

let groups={};
items.forEach(x=>{
if(x.gid!=null)(groups[x.gid]??=[]).push(x.i);
else groups["s"+x.i]=[x.i];
});

Object.values(groups).forEach(g=>{
let start=Math.min(...g);
let end=Math.max(...g);

let text=words.map((w,i)=>{
if(i===start)return"______";
if(i>start&&i<=end)return"";
return w;
}).join(" ");

let ans=g.map(i=>words[i]).join(" ");
selectedQ.push({text,ans});
});
});

selectedQ=selectedQ.sort(()=>Math.random()-0.5).slice(0,10);
renderQuiz();
}

/* ===== 表示＆ドラッグ ===== */
let touchWord=null,clone=null;

function renderQuiz(){
let vocab=selectedQ.map(q=>q.ans).sort(()=>Math.random()-0.5);
let html="";

selectedQ.forEach((q,i)=>{
html+=`
<div>
${q.text.replace("______",
`<span class="blank" data-i="${i}">______</span>`)}
</div>`;
});

html+=`<div id="vocabBox">`;

vocab.forEach(v=>{
html+=`
<div class="wordBox"
ontouchstart="dragStart(event,'${v}')"
ontouchmove="dragMove(event)"
ontouchend="dragEnd(event)">
${v}</div>`;
});

html+=`</div><button onclick="check()">答え合わせ</button>`;
quiz.innerHTML=html;
}

function dragStart(e,w){
touchWord=w;
clone=document.createElement("div");
clone.className="draggingClone";
clone.innerText=w;
document.body.appendChild(clone);
}

function dragMove(e){
if(!clone)return;
let t=e.touches[0];
clone.style.left=(t.clientX-30)+"px";
clone.style.top=(t.clientY-20)+"px";
}

function dragEnd(e){
if(!clone)return;
let t=e.changedTouches[0];
let target=document.elementFromPoint(t.clientX,t.clientY);

if(target&&target.classList.contains("blank")){
let i=+target.dataset.i;

/* 既に使ってたら移動 */
Object.keys(answers).forEach(k=>{
if(answers[k]===touchWord)answers[k]=undefined;
});

answers[i]=touchWord;
updateUI();
}

clone.remove();
clone=null;
}

function updateUI(){
document.querySelectorAll(".blank").forEach((el,i)=>{
el.innerText=answers[i]||"______";
});

document.querySelectorAll(".wordBox").forEach(el=>{
let used=Object.values(answers).includes(el.innerText);
el.classList.toggle("used",used);
});
}

/* 判定 */
function check(){
document.querySelectorAll(".blank").forEach((el,i)=>{
let ok=el.innerText===selectedQ[i].ans;
el.classList.add(ok?"correct":"wrong");
});
}

</script>
</body>
</html>
